name: Bug Report
description: Report a bug or unexpected behavior in emux
title: "[Bug]: "
labels: ["type: bug", "status: needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us diagnose and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I try to..., the following happens..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Start emux with '...'
        2. Press '...'
        3. Run command '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: "I expected..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: "But instead..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of emux is affected?
      multiple: true
      options:
        - Parser (emux-vt)
        - Terminal/Screen (emux-term)
        - PTY (emux-pty)
        - Multiplexer (emux-mux)
        - Configuration (emux-config)
        - Daemon (emux-daemon)
        - IPC (emux-ipc)
        - Rendering (emux-render)
        - CLI
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How severe is this bug?
      options:
        - Low - Nice to fix
        - Medium - Should be fixed
        - High - Important to fix soon
        - Critical - Blocking/breaking functionality
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide relevant environment details:
      placeholder: |
        OS: macOS 15.0 / Ubuntu 24.04 / Windows 11
        Terminal: iTerm2 / Alacritty / Windows Terminal
        Shell: zsh / bash / fish
        Rust: 1.85.0
        emux: 0.1.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: If applicable, paste any error messages or stack traces
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, terminal recordings, etc.)
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
